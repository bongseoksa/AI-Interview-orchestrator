# CrewAI 태스크 정의
# Step별 워크플로우에서 사용하는 태스크 템플릿

# --- Step 1: Discovery & 시장 조사 ---
market_research:
  description: >
    "{topic}" 분야의 시장 현황을 조사한다.
    1. 국내외 주요 경쟁 서비스 5~10개 식별
    2. 각 서비스의 핵심 기능, 타깃 사용자, 비즈니스 모델 분석
    3. 차별화 포인트와 시장 기회(gap) 도출
    4. 임팩트-공수 매트릭스로 우선순위 정리

    AI Interview 서비스 맥락: CS 면접 준비 서비스로, 개념 학습(메타인지) →
    면접 질문 출제 → 답변 평가의 학습 루프를 제공한다.
  expected_output: >
    경쟁사 분석 보고서 (마크다운). 서비스별 기능 비교표, 차별화 포인트,
    시장 기회 분석, 임팩트-공수 매트릭스 포함.
  agent: strategy_manager
  output_file: output/step1-market-research.md

competitor_deep_dive:
  description: >
    시장 조사 결과를 기반으로 상위 3개 경쟁 서비스를 심층 분석한다.
    1. UX 플로우 분석 (회원가입 → 학습 → 면접 → 피드백)
    2. 기술 스택 추정 (공개 정보 기반)
    3. 가격 정책 및 무료/유료 기능 구분
    4. 사용자 리뷰/평점 분석 (강점/불만사항)
  expected_output: >
    상위 3개 경쟁사 심층 분석 보고서. 각 서비스별 UX 플로우 다이어그램,
    기술 스택 추정, 가격 비교표, 사용자 피드백 요약 포함.
  agent: strategy_manager
  context:
    - market_research
  output_file: output/step1-competitor-deep-dive.md

# --- Step 2: PRD 작성 ---
prd_draft:
  description: >
    시장 조사와 경쟁사 분석 결과를 기반으로 PRD(Product Requirements Document)를 작성한다.
    1. 제품 비전 및 목표
    2. 타깃 사용자 페르소나 정의
    3. 핵심 기능 목록 (MVP 범위 명확히 구분)
    4. 사용자 여정 (User Journey)
    5. 성공 지표 (KPI)
    6. 제약사항 및 가정
  expected_output: >
    PRD 문서 (마크다운). 제품 비전, 페르소나, MVP 기능 목록,
    사용자 여정, 성공 지표, 제약사항 포함.
  agent: product_manager
  context:
    - market_research
    - competitor_deep_dive
  output_file: output/step2-prd.md

# --- Step 3: 기능 스펙 정의 ---
feature_spec:
  description: >
    PRD를 기반으로 MVP 기능별 상세 스펙을 정의한다.
    각 기능에 대해:
    1. 기능 설명 및 범위
    2. Acceptance Criteria (Given-When-Then)
    3. 엣지 케이스
    4. 의존성 및 블로커
    5. 우선순위 (Must/Should/Could)
  expected_output: >
    기능 스펙 문서 (마크다운). 기능별 상세 스펙, AC, 엣지 케이스,
    의존성, 우선순위 포함.
  agent: project_manager
  context:
    - prd_draft
  output_file: output/step3-feature-spec.md

# --- Step 4: 유저 스토리 ---
user_stories:
  description: >
    기능 스펙을 기반으로 유저 스토리를 작성한다.
    형식: As a [사용자], I want to [행동], so that [가치].
    각 유저 스토리에 Acceptance Criteria(Given/When/Then)를 포함한다.
  expected_output: >
    유저 스토리 문서 (마크다운). 에픽별 분류, 각 스토리에 AC 포함.
  agent: project_manager
  context:
    - feature_spec
  output_file: output/step4-user-stories.md
