prd_draft:
  description: >
    'AI Interview' 서비스의 PRD(Product Requirements Document)를 작성한다.
    이 서비스는 프론트엔드 엔지니어를 위한 AI 기반 CS 기술 학습 및 모의 면접 서비스이다.

    [시장 조사 결과 요약]
    - 경쟁사: InterviewCake(체계적 학습 경로), LeetCode(알고리즘 문제 풀이), Preple/Interviewer.ai(AI 모의 면접)
    - 시장 Gap: 단순 연습과 학습 후 피드백 사이의 간극 존재. 메타인지 기반 학습 부재.
    - 차별화: "개념 학습(메타인지) → 면접 질문 출제 → 답변 평가"의 학습 루프 구조

    [서비스 핵심]
    - Phase 0: 개념 학습 (메타인지) — CS 기초 개념을 이해하고 자신이 모르는 것을 파악
    - Phase 1: AI 모의 면접 — LLM 기반 꼬리 질문 엔진으로 실전 면접 시뮬레이션
    - 타깃: CS 기본기가 부족한 상태에서 면접 대비 시간이 촉박한 프론트엔드 개발자
    - 운영: 무자본 1인 개인, 무료 인프라만 활용 (Vercel, Supabase 등)
    - 기술 스택: Next.js 16 (프론트), Python (백엔드), Supabase (DB/Auth)

    PRD에 포함할 내용:
    1. 제품 비전 및 목표
    2. 타깃 사용자 페르소나 정의 (프론트엔드 개발자 중심)
    3. 핵심 기능 목록 (MVP 범위: Phase 0 개념 학습에 집중)
    4. 사용자 여정 (User Journey)
    5. 성공 지표 (KPI)
    6. 제약사항 및 가정 (무자본 1인 운영, 무료 인프라)
  expected_output: >
    AI Interview 서비스의 PRD 문서 (마크다운). 제품 비전, 프론트엔드 개발자 페르소나,
    Phase 0 MVP 기능 목록, 사용자 여정, 성공 지표, 무자본 운영 제약사항 포함.
  agent: product_manager
  output_file: output/step2-prd.md

feature_spec:
  description: >
    AI Interview 서비스의 PRD를 기반으로 MVP(Phase 0: 개념 학습) 기능별 상세 스펙을 정의한다.
    서비스 도메인: CS 기술 면접 학습 (프론트엔드 엔지니어 대상).
    핵심 기능: 메타인지 기반 개념 학습, LLM 꼬리 질문, 취약 개념 분석.
    기술 제약: Next.js 16, Supabase, 무료 인프라만 사용.

    각 기능에 대해:
    1. 기능 설명 및 범위
    2. Acceptance Criteria (Given-When-Then)
    3. 엣지 케이스
    4. 의존성 및 블로커
    5. 우선순위 (Must/Should/Could)
  expected_output: >
    AI Interview MVP 기능 스펙 문서 (마크다운). CS 학습 기능별 상세 스펙, AC, 엣지 케이스,
    의존성, 우선순위 포함.
  agent: project_manager
  context:
    - prd_draft
  output_file: output/step3-feature-spec.md

user_stories:
  description: >
    AI Interview 서비스의 기능 스펙을 기반으로 유저 스토리를 작성한다.
    사용자는 프론트엔드 개발자로, CS 면접 준비를 위해 개념 학습과 모의 면접을 수행한다.
    형식: As a [프론트엔드 개발자/면접 준비생], I want to [행동], so that [가치].
    각 유저 스토리에 Acceptance Criteria(Given/When/Then)를 포함한다.
  expected_output: >
    AI Interview 유저 스토리 문서 (마크다운). 에픽별 분류, 각 스토리에 AC 포함.
  agent: project_manager
  context:
    - feature_spec
  output_file: output/step4-user-stories.md
