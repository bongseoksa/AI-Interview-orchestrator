cicd_pipeline:
  description: >
    "{topic}" 프로젝트의 CI/CD 파이프라인을 설계한다.

    [서비스 컨텍스트]
    - AI Interview: 프론트엔드 엔지니어를 위한 CS 면접 준비 서비스
    - 레포: web (Next.js 16, pnpm), server (Python, TBD), orchestrator (Python, CrewAI)
    - 배포: Vercel (프론트엔드), Supabase (DB/Auth)
    - 비용 제약: 무료 플랜만 사용 (Vercel Free, Supabase Free, GitHub Actions Free)

    [파이프라인 설계 포함 사항]
    1. GitHub Actions 워크플로우 구성
       - PR 시: lint + type-check + unit test + build
       - main merge 시: 자동 배포 (Vercel)
    2. 환경 분리 전략 (development / staging / production)
    3. 시크릿 관리 (GitHub Secrets, .env.local)
    4. 브랜치 전략 (GitHub Flow 기반)
    5. Vercel Preview Deployment 활용
    6. Supabase 마이그레이션 자동화
    7. 무료 플랜 한도 내 최적 구성 (GitHub Actions 2,000분/월)
  expected_output: >
    CI/CD 파이프라인 설계 문서 (마크다운). GitHub Actions YAML 예시,
    환경 분리 전략, 시크릿 관리 방안, 브랜치 전략, 무료 플랜 최적화 포함.
  agent: infra_expert
  output_file: output/infra-cicd-pipeline.md

deploy_strategy:
  description: >
    CI/CD 파이프라인을 기반으로 배포 및 운영 전략을 수립한다.

    [배포 전략 포함 사항]
    1. Vercel 배포 설정 (빌드 커맨드, 환경변수, 도메인)
    2. Supabase Free Tier 운영 전략 (500MB DB, 50K rows, pause 정책)
    3. 모니터링/알림 체계 (Vercel Analytics, Supabase Dashboard)
    4. 장애 대응 계획 (MTTR 최소화)
    5. 보안 체크리스트 (HTTPS, API Key 관리, RLS, CORS)
    6. 성능 모니터링 (Core Web Vitals, Lighthouse CI)
    7. 백업/복구 전략 (Supabase 자동 백업 활용)
    8. 스케일링 계획 (무료 → 유료 전환 기준)
  expected_output: >
    배포 및 운영 전략 문서 (마크다운). Vercel/Supabase 설정,
    모니터링 계획, 보안 체크리스트, 스케일링 기준 포함.
  agent: infra_expert
  context:
    - cicd_pipeline
  output_file: output/infra-deploy-strategy.md
