doc_audit:
  description: >
    "{topic}" 관련 프로젝트 문서의 정합성을 검증한다.

    [프로젝트 문서 구조]
    - Notion: 메인 허브 → 기획서, 사업계획서, 프로젝트 진행 가이드
    - 로컬: 3개 레포 각각 CLAUDE.md, ONBOARDING.md, docs/ 폴더
    - Orchestrator output/: Crew 실행 산출물

    [검증 포함 사항]
    1. Notion 문서와 로컬 문서 간 정보 일치 여부
       - 기술 스택 버전, 에이전트 수, Phase 정의 등 핵심 정보
    2. 레포 간 CLAUDE.md / ONBOARDING.md 정합성
       - 공통 정보(비용 정책, 모델 전략 등)의 일관성
    3. PRD와 기획서 간 기능 목록 일치 여부
    4. 의사결정 기록의 누락 항목 확인
    5. 산출물 파일과 Notion 문서 간 내용 불일치 탐지
    6. 문서 레지스트리 최신화 상태 확인

    [크로스 문서 정합성 검증 — 필수]
    아래 핵심 스펙 항목들이 모든 문서에서 동일한 값을 가지는지 반드시 검증한다.
    불일치 발견 시 "정합성 불일치" 섹션에 별도 정리하고 심각도 Critical로 분류한다.

    핵심 스펙 항목:
    a) 카테고리 수 및 목록 (PRD, Handoff, 시드 데이터 뱅크, DB ENUM, 코드 상수)
    b) Q&A 데이터 수 (시드 데이터 뱅크 vs Handoff vs 코드 쿼리 결과)
    c) 난이도 분류 체계 (시드 데이터 뱅크 vs DB ENUM vs 코드 타입)
    d) 마일스톤 정의 및 완료 상태 (PRD vs Handoff vs 진행 가이드)
    e) 에이전트 수 및 Crew 구성 (CLAUDE.md vs agents/ YAML vs 에이전트 조직 구조)
    f) 기술 스택 버전 (CLAUDE.md vs package.json vs PRD)
  expected_output: >
    문서 정합성 감사 보고서 (마크다운). 불일치 항목 목록,
    심각도 분류 (Critical/Warning/Info), 수정 제안 포함.
    반드시 "크로스 문서 정합성 검증 결과" 섹션을 포함할 것.
  agent: doc_secretary
  output_file: output/doc-audit-report.md

changelog_update:
  description: >
    문서 감사 결과를 기반으로 변경 이력(CHANGELOG)을 갱신하고,
    문서 동기화 계획을 수립한다.

    [CHANGELOG 포함 사항]
    1. 최근 세션의 의사결정 사항 요약
    2. 변경된 문서 목록 (파일 경로, 변경 유형)
    3. 새로 생성된 산출물 목록
    4. Notion 동기화 필요 항목
    5. 다음 동기화 시 우선 처리할 항목

    [동기화 계획]
    - Notion → 로컬: 어떤 정보를 로컬에 반영해야 하는가
    - 로컬 → Notion: 어떤 산출물을 Notion에 업로드해야 하는가
    - 자동화 가능 여부 판단
  expected_output: >
    CHANGELOG 업데이트 내용 + 문서 동기화 계획 (마크다운).
    변경 이력, 동기화 필요 항목, 우선순위 포함.
  agent: doc_secretary
  context:
    - doc_audit
  output_file: output/doc-changelog-sync.md

notion_draft:
  description: >
    문서 감사와 CHANGELOG 결과를 기반으로, Notion에 반영할 업데이트 초안을 작성한다.
    이 초안은 사람이 리뷰한 후 Notion API로 반영하는 2단계 워크플로우의 1단계이다.

    [대상 Notion 페이지]
    아래 페이지 중 업데이트가 필요한 페이지만 초안을 작성한다.
    업데이트가 불필요한 페이지는 건너뛴다.

    1. 메인 허브 (AI Interview) — 현재 진행 단계, 레포지토리 상태
    2. 프로젝트 진행 가이드 — 다음 액션, 완료 항목, 블로커
    3. 의사결정 기록 — 새 의사결정 사항
    4. 기획서 — 기능/카테고리/스펙 변경사항
    5. 사업계획서 — 기술 스택, 에이전트 구성 변경사항
    6. 에이전트 조직 구조 — 에이전트/Crew 변경사항

    [초안 작성 규칙]
    - 각 페이지별로 "## [페이지명]" 섹션을 만든다
    - 각 섹션 아래에 "변경 유형" (추가/수정/삭제)과 "변경 내용"을 명시한다
    - 변경 내용은 Notion 마크다운 호환 형식으로 작성한다
    - 기존 내용 중 어디에 삽입/수정해야 하는지 위치를 "위치: ..." 으로 안내한다
    - 변경 근거를 간략히 명시한다 (어떤 감사 항목에서 도출되었는지)

    [출력 구조 예시]
    ```
    # Notion 업데이트 초안
    생성일: YYYY-MM-DD
    근거: 문서 감사 보고서 + CHANGELOG

    ## 메인 허브 (AI Interview)
    ### 변경 1: 현재 진행 단계 업데이트
    - 변경 유형: 수정
    - 위치: "현재 진행 단계" 섹션
    - 변경 내용:
      - Step 4 상태를 "진행 중 — M3(메타인지 진단)" 으로 변경
    - 근거: CHANGELOG — M2 완료 반영

    ## 의사결정 기록
    ### 변경 1: 새 의사결정 추가
    - 변경 유형: 추가
    - 위치: 페이지 하단
    - 변경 내용:
      ### YYYY-MM-DD — [세션 제목]
      - **[결정 사항]** — [상세 내용]
    - 근거: doc_audit — 의사결정 기록 누락 항목
    ```
  expected_output: >
    Notion 업데이트 초안 (마크다운). 페이지별 변경사항, 변경 유형, 위치 안내,
    Notion 호환 마크다운 내용, 변경 근거 포함.
    업데이트가 필요한 페이지가 없으면 "업데이트 불필요" 로 명시.
  agent: doc_secretary
  context:
    - doc_audit
    - changelog_update
  output_file: output/notion-update-draft.md
