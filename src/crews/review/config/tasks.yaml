devils_advocate:
  description: >
    "{topic}" 에 대해 Devil's Advocate 관점에서 비판적 리뷰를 수행한다.

    [AI Interview 서비스 컨텍스트]
    - 프론트엔드 엔지니어를 위한 AI 기반 CS 면접 준비 서비스
    - 차별화: 메타인지 학습 + 학습→면접 클로즈드 루프
    - 운영: 무자본 1인 개인, 무료 인프라
    - Phase 0 MVP: 개념 학습 (메타인지)

    [리뷰 관점 — 3축 분석]
    1. 사용자 관점:
       - 이 서비스를 사용해야 하는 이유가 충분한가?
       - ChatGPT로 대체할 수 없는 가치가 명확한가?
       - 타겟 사용자(프론트엔드 개발자)가 실제로 이런 서비스를 원하는가?
       - 유저 리텐션을 유지할 수 있는 구조인가?
    2. 시장 관점:
       - GreatFrontEnd이 메타인지 기능을 추가하면 어떻게 되는가?
       - SOM 65억원 추정의 근거는 충분한가?
       - 무료 서비스로 시작해서 수익화 전환이 실제로 가능한가?
       - 한국 시장만으로 충분한가, 글로벌 확장이 필수인가?
    3. 기술 관점:
       - 1인 개발로 이 범위의 서비스를 유지보수할 수 있는가?
       - Ollama 로컬 LLM의 품질이 서비스 수준에 도달하는가?
       - Supabase Free Tier로 서비스 운영이 지속 가능한가?
       - 기술 부채가 빠르게 누적될 리스크는 없는가?

    [피드백 원칙]
    - "좋다/괜찮다" 표현 금지
    - 모든 지적에 근거 또는 반례 포함
    - 마지막에 "이 피드백에도 불구하고 진행할 가치가 있는 이유" 질문 포함
  expected_output: >
    Devil's Advocate 리뷰 보고서 (마크다운). 사용자/시장/기술 3축 분석,
    각 축별 리스크와 맹점, 구체적 근거, 대응 제안 포함.
    마지막 섹션에 "그럼에도 진행할 가치가 있는가?" 질문 포함.
  agent: external_advisor
  output_file: output/review-devils-advocate.md

competitiveness_analysis:
  description: >
    Devil's Advocate 리뷰를 기반으로 경쟁력 취약점을 심층 분석한다.

    [분석 포함 사항]
    1. 경쟁사 대비 취약점 매트릭스
       - GreatFrontEnd 대비: 콘텐츠 양, 커뮤니티, 브랜드
       - ChatGPT/Claude 대비: 유연성, 접근성, 비용
       - 한국 서비스(사람인, 모카번) 대비: 사용자 기반, 마케팅
    2. 방어 가능성 평가 (Defensibility)
       - 기술적 해자(moat)가 존재하는가?
       - 네트워크 효과가 가능한 구조인가?
       - 데이터 우위를 확보할 수 있는가?
    3. 실패 시나리오 분석 (Pre-mortem)
       - 가장 가능성 높은 실패 원인 Top 3
       - 각 시나리오별 조기 경고 지표
       - 피봇 가능성 및 방향
    4. 생존 전략 제안
       - 1인 운영의 현실적 한계 인정 후 전략
       - 최소 생존 가능 전략 (무엇을 포기할 것인가)
  expected_output: >
    경쟁력 취약점 분석 보고서 (마크다운). 경쟁사별 취약점 매트릭스,
    방어 가능성 평가, 실패 시나리오 Top 3, 생존 전략 포함.
  agent: external_advisor
  context:
    - devils_advocate
  output_file: output/review-competitiveness.md
