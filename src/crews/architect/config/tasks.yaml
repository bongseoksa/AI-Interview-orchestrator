schema_design:
  description: >
    AI Interview 서비스의 Phase 0(개념 학습) Supabase 데이터베이스 스키마를 설계한다.

    [서비스 컨텍스트]
    - 프론트엔드 개발자를 위한 CS 면접 준비 서비스
    - Phase 0: 메타인지 기반 개념 학습 (MVP)
    - 기술 스택: Next.js 16 (App Router, SSG), Supabase (PostgreSQL + Auth), Tailwind CSS
    - 무자본 1인 운영, Supabase Free Tier (500MB, 50K rows)

    [Phase 0 기능]
    1. 커리큘럼 대시보드: 8개 카테고리(HTML, CSS, JavaScript, React, Next.js, 인프라/보안/네트워크, 형상관리, 성능/SEO)의 학습 로드맵
    2. 메타인지 체크아웃: 카테고리별 5~10개 진단 퀴즈로 취약점 파악
    3. 개념 학습 모듈: 노드별 상세 학습 페이지 [개념 정의], [핵심 원리], [면접 빈출 키워드]
    4. AI 요약/팁: LLM이 생성하는 동적 콘텐츠 (fallback 필요)
    5. 지식 상태 트래킹: 사용자별 학습 진행도

    [정적 데이터]
    - 노션 시드 DB에서 120~150개 Q&A 관리 (질문, 카테고리, 난이도, 답변가이드, 핵심키워드)
    - 빌드 타임에 Supabase에서 fetch → generateStaticParams()로 SSG 생성
    - 진단 질문은 정적 세트 (LLM 비용 0원)

    [설계 요구사항]
    1. Supabase SQL 스키마 (테이블, enum, 인덱스, RLS 정책)
    2. 테이블 간 관계 및 정규화 수준 결정 (과도한 정규화 경계)
    3. SSG 빌드 파이프라인과의 호환성 (generateStaticParams에서 필요한 쿼리)
    4. Supabase Auth + RLS 기반 사용자 데이터 보호
    5. LLM fallback을 위한 default_tip 컬럼 설계
    6. 시드 스크립트(노션 → Supabase) 데이터 흐름

  expected_output: >
    Supabase PostgreSQL 스키마 SQL 파일. 테이블 정의, enum, 인덱스, RLS 정책,
    시드 데이터 INSERT 예시, 설계 결정 근거(ADR 형식) 포함.
  agent: fullstack_architect
  output_file: output/step3-schema-design.sql

data_flow_review:
  description: >
    풀스택 아키텍트가 설계한 스키마를 기반으로, 백엔드 관점에서 데이터 흐름을 검토한다.

    [검토 항목]
    1. 노션 시드 → Supabase 마이그레이션 스크립트 설계
       - @notionhq/client로 노션 DB 전량 조회
       - 카테고리/난이도 한글 → enum 매핑
       - 핵심키워드 쉼표 분리 → TEXT[] 배열 변환
       - upsert 전략 (slug 기준 idempotent)
    2. Next.js SSG 빌드 시 Supabase 호출 패턴
       - 빌드 타임에 몇 번의 쿼리가 필요한가?
       - 쿼리 최적화 (인덱스 활용, 불필요한 컬럼 제외)
    3. LLM API 호출 실패 시 fallback 전략
       - default_tip 컬럼 활용
       - 재시도 정책 (타임아웃, 최대 3회)
    4. Supabase Free Tier 한도 내 운영 가능성
       - 500MB DB, 50K rows 제한
       - 예상 데이터 볼륨 계산

    [참고]
    - 스키마 설계는 이전 태스크(schema_design)의 output을 컨텍스트로 사용
    - Next.js 16 App Router의 generateStaticParams() 패턴 참고
    - Supabase Auth의 auth.users 테이블과 user_progress 연동

  expected_output: >
    데이터 흐름 검토 문서 (마크다운). 시드 스크립트 pseudocode,
    SSG 빌드 쿼리 목록, LLM fallback 전략, Free Tier 용량 계산 포함.
  agent: backend_senior
  context:
    - schema_design
  output_file: output/step3-data-flow-review.md
